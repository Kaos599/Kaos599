<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes border-trace {
        0% { stroke-dashoffset: 2200; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes glow-pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes shimmer {
        0% { transform: translateX(-800px); }
        100% { transform: translateX(800px); }
      }
      @keyframes tag-fade {
        0%, 30% { opacity: 0; transform: translateY(6px); }
        50%, 100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes winner-glow {
        0%, 100% { filter: drop-shadow(0 0 4px #fbbf24) drop-shadow(0 0 10px #fbbf2480); }
        50% { filter: drop-shadow(0 0 8px #fbbf24) drop-shadow(0 0 20px #fbbf24bb); }
      }
      .mono { font-family: 'Courier New', monospace; }
      .card-border { stroke-dasharray: 2200; animation: border-trace 2s ease-out both; }
    </style>
    <filter id="glow-c">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm-c">
      <feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0f0a"/>
    </linearGradient>
    <linearGradient id="accent-grad-c" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39d353"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39d353;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#39d353;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#39d353;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="card-clip"><rect x="0" y="0" width="800" height="180" rx="4"/></clipPath>
  </defs>

  <!-- Card BG -->
  <rect width="800" height="180" rx="4" fill="url(#card-bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#39d353" stroke-width="0.5" clip-path="url(#card-clip)">
    <line x1="0" y1="45" x2="800" y2="45"/><line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="135" x2="800" y2="135"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="400" y1="0" x2="400" y2="180"/>
    <line x1="600" y1="0" x2="600" y2="180"/>
  </g>

  <!-- Shimmer effect -->
  <rect x="-800" y="0" width="800" height="180" fill="url(#shimmer-grad)" clip-path="url(#card-clip)" style="animation: shimmer 3s ease-in-out 1s infinite;"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="180" rx="2" fill="url(#accent-grad-c)"/>

  <!-- Border -->
  <rect x="1" y="1" width="798" height="178" rx="4" fill="none" stroke="#39d35340" stroke-width="1.5" class="card-border"/>

  <!-- Corner marks -->
  <g stroke="#39d353" fill="none" stroke-width="1.5" opacity="0.7">
    <polyline points="750,10 790,10 790,30"/><polyline points="750,170 790,170 790,150"/>
  </g>

  <!-- Project number + type -->
  <text x="28" y="38" class="mono" font-size="9" fill="#39d35360" letter-spacing="3">PROJECT_01  ·  AGENTIC_SYSTEM</text>

  <!-- Main title -->
  <text x="28" y="72" class="mono" font-size="32" font-weight="900" fill="#39d353" letter-spacing="4" filter="url(#glow-c)">CASCADE</text>

  <!-- Winner badge -->
  <g style="animation: winner-glow 2s ease-in-out infinite;" transform="translate(220, 48)">
    <rect x="0" y="0" width="130" height="22" rx="11" fill="#fbbf2415" stroke="#fbbf24" stroke-width="1"/>
    <text x="65" y="15" class="mono" font-size="9" fill="#fbbf24" text-anchor="middle" letter-spacing="1">🏆 GOOGLE GENAI WINNER</text>
  </g>

  <!-- Description -->
  <text x="28" y="102" class="mono" font-size="11" fill="#8b949e">Multi-agent research orchestrator · LangGraph swarms · Autonomous data gathering</text>
  <text x="28" y="120" class="mono" font-size="11" fill="#8b949e">Real-time synthesis · Gemini-powered reasoning · Production-grade pipelines</text>

  <!-- Tech tags -->
  <g style="animation: tag-fade 2s ease-out both;">
    <rect x="28" y="138" width="80" height="22" rx="2" fill="#39d35315" stroke="#39d35340" stroke-width="1"/>
    <text x="68" y="153" class="mono" font-size="9" fill="#39d353" text-anchor="middle" letter-spacing="1">LANGGRAPH</text>

    <rect x="116" y="138" width="72" height="22" rx="2" fill="#39d35315" stroke="#39d35340" stroke-width="1"/>
    <text x="152" y="153" class="mono" font-size="9" fill="#39d353" text-anchor="middle" letter-spacing="1">LANGCHAIN</text>

    <rect x="196" y="138" width="60" height="22" rx="2" fill="#39d35315" stroke="#39d35340" stroke-width="1"/>
    <text x="226" y="153" class="mono" font-size="9" fill="#39d353" text-anchor="middle" letter-spacing="1">GEMINI</text>

    <rect x="264" y="138" width="56" height="22" rx="2" fill="#39d35315" stroke="#39d35340" stroke-width="1"/>
    <text x="292" y="153" class="mono" font-size="9" fill="#39d353" text-anchor="middle" letter-spacing="1">PYTHON</text>

    <rect x="328" y="138" width="58" height="22" rx="2" fill="#39d35315" stroke="#39d35340" stroke-width="1"/>
    <text x="357" y="153" class="mono" font-size="9" fill="#39d353" text-anchor="middle" letter-spacing="1">FASTAPI</text>
  </g>

  <!-- Right: arrow + view -->
  <g filter="url(#glow-sm-c)" style="animation: glow-pulse 3s ease-in-out infinite;">
    <text x="755" y="96" class="mono" font-size="24" fill="#39d353" text-anchor="middle">→</text>
    <text x="755" y="115" class="mono" font-size="8" fill="#39d35399" text-anchor="middle" letter-spacing="2">VIEW</text>
  </g>
</svg>
