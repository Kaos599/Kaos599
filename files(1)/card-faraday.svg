<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes border-trace { 0% { stroke-dashoffset: 2200; } 100% { stroke-dashoffset: 0; } }
      @keyframes glow-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes shimmer { 0% { transform: translateX(-800px); } 100% { transform: translateX(800px); } }
      @keyframes tag-fade { 0%, 30% { opacity: 0; transform: translateY(6px); } 50%, 100% { opacity: 1; transform: translateY(0); } }
      @keyframes wave {
        0%, 100% { d: path("M0,90 Q200,70 400,90 T800,90"); }
        50% { d: path("M0,90 Q200,110 400,90 T800,90"); }
      }
      .mono { font-family: 'Courier New', monospace; }
      .card-border { stroke-dasharray: 2200; animation: border-trace 2s ease-out 0.3s both; }
    </style>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm-f">
      <feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="card-bg-f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent-grad-f" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/><stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="shimmer-f" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="card-clip-f"><rect x="0" y="0" width="800" height="180" rx="4"/></clipPath>
  </defs>

  <rect width="800" height="180" rx="4" fill="url(#card-bg-f)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.5" clip-path="url(#card-clip-f)">
    <line x1="0" y1="45" x2="800" y2="45"/><line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="135" x2="800" y2="135"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="400" y1="0" x2="400" y2="180"/>
    <line x1="600" y1="0" x2="600" y2="180"/>
  </g>

  <rect x="-800" y="0" width="800" height="180" fill="url(#shimmer-f)" clip-path="url(#card-clip-f)" style="animation: shimmer 3.5s ease-in-out 1.5s infinite;"/>

  <!-- Left accent bar - blue -->
  <rect x="0" y="0" width="4" height="180" rx="2" fill="url(#accent-grad-f)"/>

  <!-- Border -->
  <rect x="1" y="1" width="798" height="178" rx="4" fill="none" stroke="#58a6ff40" stroke-width="1.5" class="card-border"/>

  <!-- Corner marks -->
  <g stroke="#58a6ff" fill="none" stroke-width="1.5" opacity="0.7">
    <polyline points="750,10 790,10 790,30"/><polyline points="750,170 790,170 790,150"/>
  </g>

  <text x="28" y="38" class="mono" font-size="9" fill="#58a6ff60" letter-spacing="3">PROJECT_02  ·  PHYSICS_AI</text>

  <!-- Main title -->
  <text x="28" y="72" class="mono" font-size="32" font-weight="900" fill="#58a6ff" letter-spacing="4" filter="url(#glow-f)">FARADAY</text>

  <!-- Badge -->
  <rect x="210" y="48" width="80" height="22" rx="11" fill="#58a6ff15" stroke="#58a6ff60" stroke-width="1"/>
  <text x="250" y="63" class="mono" font-size="9" fill="#58a6ff" text-anchor="middle" letter-spacing="1">RAG · LLM</text>

  <text x="28" y="102" class="mono" font-size="11" fill="#8b949e">Physics question-answering agent · RAG-augmented retrieval · Multi-source corpus</text>
  <text x="28" y="120" class="mono" font-size="11" fill="#8b949e">Semantic search · ChromaDB embeddings · Precision-targeted responses</text>

  <!-- Tags - blue themed -->
  <g style="animation: tag-fade 2s ease-out 0.3s both;">
    <rect x="28" y="138" width="62" height="22" rx="2" fill="#58a6ff15" stroke="#58a6ff40" stroke-width="1"/>
    <text x="59" y="153" class="mono" font-size="9" fill="#58a6ff" text-anchor="middle" letter-spacing="1">CHROMADB</text>

    <rect x="98" y="138" width="56" height="22" rx="2" fill="#58a6ff15" stroke="#58a6ff40" stroke-width="1"/>
    <text x="126" y="153" class="mono" font-size="9" fill="#58a6ff" text-anchor="middle" letter-spacing="1">QDRANT</text>

    <rect x="162" y="138" width="80" height="22" rx="2" fill="#58a6ff15" stroke="#58a6ff40" stroke-width="1"/>
    <text x="202" y="153" class="mono" font-size="9" fill="#58a6ff" text-anchor="middle" letter-spacing="1">LANGCHAIN</text>

    <rect x="250" y="138" width="56" height="22" rx="2" fill="#58a6ff15" stroke="#58a6ff40" stroke-width="1"/>
    <text x="278" y="153" class="mono" font-size="9" fill="#58a6ff" text-anchor="middle" letter-spacing="1">PYTHON</text>

    <rect x="314" y="138" width="60" height="22" rx="2" fill="#58a6ff15" stroke="#58a6ff40" stroke-width="1"/>
    <text x="344" y="153" class="mono" font-size="9" fill="#58a6ff" text-anchor="middle" letter-spacing="1">OPENAI</text>
  </g>

  <g filter="url(#glow-sm-f)" style="animation: glow-pulse 3s ease-in-out infinite;">
    <text x="755" y="96" class="mono" font-size="24" fill="#58a6ff" text-anchor="middle">→</text>
    <text x="755" y="115" class="mono" font-size="8" fill="#58a6ff99" text-anchor="middle" letter-spacing="2">VIEW</text>
  </g>
</svg>
