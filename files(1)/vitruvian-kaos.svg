<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes spin-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
      @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse-ring {
        0%, 100% { opacity: 0.3; r: 190px; }
        50% { opacity: 0.8; r: 194px; }
      }
      @keyframes node-pulse {
        0%, 100% { r: 4px; opacity: 0.6; }
        50% { r: 7px; opacity: 1; }
      }
      @keyframes beam-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes matrix-fall {
        0% { transform: translateY(-520px); opacity: 0; }
        5% { opacity: 1; }
        95% { opacity: 1; }
        100% { transform: translateY(520px); opacity: 0; }
      }
      @keyframes core-breathe {
        0%, 100% { filter: drop-shadow(0 0 12px #39d353) drop-shadow(0 0 30px #39d35350); }
        50% { filter: drop-shadow(0 0 25px #39d353) drop-shadow(0 0 60px #39d35380) drop-shadow(0 0 90px #39d35320); }
      }
      @keyframes label-blink {
        0%, 90%, 100% { opacity: 1; }
        92% { opacity: 0; }
        94% { opacity: 1; }
        96% { opacity: 0; }
        98% { opacity: 1; }
      }
      @keyframes data-pulse {
        0% { stroke-dashoffset: 500; opacity: 0.3; }
        50% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.3; }
      }
      @keyframes corner-in {
        0% { opacity: 0; } 100% { opacity: 1; }
      }
      @keyframes float-y {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes scan-h {
        0% { transform: translateX(-800px); }
        100% { transform: translateX(800px); }
      }
      @keyframes glow-dot {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      .mono { font-family: 'Courier New', monospace; }
      .ring-outer { animation: spin-cw 20s linear infinite; transform-origin: 400px 260px; }
      .ring-mid { animation: spin-ccw 14s linear infinite; transform-origin: 400px 260px; }
      .ring-inner { animation: spin-cw 8s linear infinite; transform-origin: 400px 260px; }
      .ring-micro { animation: spin-ccw 5s linear infinite; transform-origin: 400px 260px; }
      .core-group { animation: core-breathe 4s ease-in-out infinite; }
      .main-label { animation: label-blink 10s infinite; font-family: 'Courier New', monospace; }
    </style>

    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c0d"/>
      <stop offset="100%" style="stop-color:#0a0f0a"/>
    </linearGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#39d35320"/>
      <stop offset="60%" style="stop-color:#39d35308"/>
      <stop offset="100%" style="stop-color:#39d35300"/>
    </radialGradient>
    <mask id="fade-mask">
      <radialGradient id="fade-grad" cx="50%" cy="50%">
        <stop offset="0%" style="stop-color:white"/>
        <stop offset="80%" style="stop-color:white"/>
        <stop offset="100%" style="stop-color:black"/>
      </radialGradient>
      <rect width="800" height="520" fill="url(#fade-grad)"/>
    </mask>
  </defs>

  <!-- BG -->
  <rect width="800" height="520" fill="url(#bg2)"/>

  <!-- Subtle horizontal scan beam -->
  <rect x="0" y="258" width="800" height="2" fill="#39d353" opacity="0.04" style="animation: scan-h 4s linear infinite;"/>

  <!-- Matrix rain columns - scattered binary -->
  <g opacity="0.12" class="mono" font-size="10" fill="#39d353">
    <!-- Column 1 -->
    <text x="22" y="0" style="animation: matrix-fall 3.2s linear 0s infinite;">1<tspan x="22" dy="12">0</tspan><tspan x="22" dy="12">1</tspan><tspan x="22" dy="12">1</tspan><tspan x="22" dy="12">0</tspan><tspan x="22" dy="12">0</tspan><tspan x="22" dy="12">1</tspan><tspan x="22" dy="12">0</tspan><tspan x="22" dy="12">1</tspan></text>
    <text x="44" y="0" style="animation: matrix-fall 4.1s linear 1.5s infinite;">0<tspan x="44" dy="12">1</tspan><tspan x="44" dy="12">0</tspan><tspan x="44" dy="12">1</tspan><tspan x="44" dy="12">1</tspan><tspan x="44" dy="12">0</tspan></text>
    <text x="66" y="0" style="animation: matrix-fall 3.8s linear 0.7s infinite;">1<tspan x="66" dy="12">1</tspan><tspan x="66" dy="12">0</tspan><tspan x="66" dy="12">0</tspan><tspan x="66" dy="12">1</tspan><tspan x="66" dy="12">0</tspan><tspan x="66" dy="12">1</tspan></text>
    <!-- Right columns -->
    <text x="710" y="0" style="animation: matrix-fall 3.5s linear 0.3s infinite;">0<tspan x="710" dy="12">1</tspan><tspan x="710" dy="12">1</tspan><tspan x="710" dy="12">0</tspan><tspan x="710" dy="12">0</tspan><tspan x="710" dy="12">1</tspan></text>
    <text x="732" y="0" style="animation: matrix-fall 4.3s linear 2.1s infinite;">1<tspan x="732" dy="12">0</tspan><tspan x="732" dy="12">1</tspan><tspan x="732" dy="12">0</tspan><tspan x="732" dy="12">1</tspan><tspan x="732" dy="12">1</tspan><tspan x="732" dy="12">0</tspan></text>
    <text x="754" y="0" style="animation: matrix-fall 3.1s linear 1.0s infinite;">0<tspan x="754" dy="12">0</tspan><tspan x="754" dy="12">1</tspan><tspan x="754" dy="12">1</tspan><tspan x="754" dy="12">0</tspan></text>
    <text x="776" y="0" style="animation: matrix-fall 3.9s linear 0.5s infinite;">1<tspan x="776" dy="12">1</tspan><tspan x="776" dy="12">0</tspan><tspan x="776" dy="12">0</tspan><tspan x="776" dy="12">1</tspan><tspan x="776" dy="12">0</tspan><tspan x="776" dy="12">1</tspan></text>
  </g>

  <!-- Radial glow backdrop -->
  <circle cx="400" cy="260" r="200" fill="url(#core-glow)"/>

  <!-- === SPINNING RINGS === -->
  <!-- Outermost dashed ring -->
  <g class="ring-outer">
    <circle cx="400" cy="260" r="210" fill="none" stroke="#39d353" stroke-width="0.5" stroke-dasharray="8 12" opacity="0.35"/>
    <!-- Nodes on outer ring -->
    <circle cx="400" cy="50" r="4" fill="#39d353" opacity="0.6" style="animation: glow-dot 2s ease-in-out infinite;"/>
    <circle cx="610" cy="158" r="4" fill="#39d353" opacity="0.6" style="animation: glow-dot 2s ease-in-out 0.5s infinite;"/>
    <circle cx="610" cy="362" r="4" fill="#39d353" opacity="0.6" style="animation: glow-dot 2s ease-in-out 1s infinite;"/>
    <circle cx="400" cy="470" r="4" fill="#39d353" opacity="0.6" style="animation: glow-dot 2s ease-in-out 1.5s infinite;"/>
    <circle cx="190" cy="362" r="4" fill="#39d353" opacity="0.6" style="animation: glow-dot 2s ease-in-out 0.3s infinite;"/>
    <circle cx="190" cy="158" r="4" fill="#39d353" opacity="0.6" style="animation: glow-dot 2s ease-in-out 0.8s infinite;"/>
  </g>

  <!-- Mid ring with tick marks -->
  <g class="ring-mid">
    <circle cx="400" cy="260" r="170" fill="none" stroke="#39d353" stroke-width="1" stroke-dasharray="3 18" opacity="0.5"/>
    <!-- Axis markers -->
    <line x1="400" y1="90" x2="400" y2="70" stroke="#39d353" stroke-width="1.5" opacity="0.7"/>
    <line x1="400" y1="430" x2="400" y2="450" stroke="#39d353" stroke-width="1.5" opacity="0.7"/>
    <line x1="230" y1="260" x2="210" y2="260" stroke="#39d353" stroke-width="1.5" opacity="0.7"/>
    <line x1="570" y1="260" x2="590" y2="260" stroke="#39d353" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Inner ring - solid, pulsing -->
  <g class="ring-inner">
    <circle cx="400" cy="260" r="130" fill="none" stroke="#39d353" stroke-width="1.5" stroke-dasharray="20 6" opacity="0.6"/>
    <!-- Rotating beam line -->
    <line x1="400" y1="260" x2="400" y2="130" stroke="#39d353" stroke-width="1" opacity="0.3"/>
    <circle cx="400" cy="135" r="3" fill="#39d353" opacity="0.8"/>
  </g>

  <!-- Micro ring -->
  <g class="ring-micro">
    <circle cx="400" cy="260" r="90" fill="none" stroke="#39d353" stroke-width="2" stroke-dasharray="12 8" opacity="0.4"/>
  </g>

  <!-- Static cross hairs -->
  <g opacity="0.15" stroke="#39d353" stroke-width="0.5">
    <line x1="400" y1="60" x2="400" y2="460"/>
    <line x1="200" y1="260" x2="600" y2="260"/>
  </g>

  <!-- === ASCII BRAIN CORE === -->
  <g class="core-group">
    <g filter="url(#glow-md)" font-family="'Courier New', monospace" font-size="11" fill="#39d353" text-anchor="middle">
      <text x="400" y="186">  .-~~~-.</text>
      <text x="400" y="198"> (  o   o  )</text>
      <text x="400" y="210"> | .-. .-. |</text>
      <text x="400" y="222"> |( v )( v )|</text>
      <text x="400" y="234"> | '-' '-' |</text>
      <text x="400" y="246">  \       /</text>
      <text x="400" y="258">   '-----'</text>
      <text x="400" y="270">   ||   ||</text>
      <text x="400" y="282">  [_]   [_]</text>
    </g>

    <!-- Core label box -->
    <rect x="310" y="298" width="180" height="28" rx="2" fill="#0d1117" stroke="#39d353" stroke-width="1.5" opacity="0.9"/>
    <rect x="310" y="298" width="180" height="28" rx="2" fill="#39d353" opacity="0.06"/>
    <text x="400" y="317" font-family="'Courier New', monospace" font-size="12" fill="#39d353" text-anchor="middle" font-weight="bold" filter="url(#glow-sm)" class="main-label">[ KAOS AGENT CORE ]</text>

    <!-- Connector lines -->
    <line x1="355" y1="282" x2="340" y2="298" stroke="#39d353" stroke-width="1" opacity="0.5"/>
    <line x1="445" y1="282" x2="460" y2="298" stroke="#39d353" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Bottom legs (feet) -->
  <g filter="url(#glow-sm)" opacity="0.8">
    <rect x="325" y="330" width="60" height="14" rx="1" fill="none" stroke="#39d353" stroke-width="1.5"/>
    <rect x="327" y="332" width="56" height="10" rx="1" fill="#39d353" opacity="0.15"/>
    <rect x="415" y="330" width="60" height="14" rx="1" fill="none" stroke="#39d353" stroke-width="1.5"/>
    <rect x="417" y="332" width="56" height="10" rx="1" fill="#39d353" opacity="0.15"/>
  </g>

  <!-- === SIDE DATA PANELS === -->
  <!-- Left panel -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#39d353" opacity="0.7">
    <text x="88" y="200">PROC:</text>
    <text x="88" y="213" opacity="1" font-size="10">LANGRAPH</text>
    <line x1="88" y1="218" x2="155" y2="218" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="88" y="230">CHAIN:</text>
    <text x="88" y="243">ACTIVE</text>
    <line x1="88" y1="248" x2="155" y2="248" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="88" y="260">VECS:</text>
    <text x="88" y="273">CHROMA/Q</text>
    <line x1="88" y1="278" x2="155" y2="278" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="88" y="290">MEM:</text>
    <text x="88" y="303">8192 TOK</text>
    <line x1="88" y1="308" x2="155" y2="308" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="88" y="320">GPU:</text>
    <text x="88" y="333">RTX 3060</text>
  </g>

  <!-- Left connector line to ring -->
  <line x1="158" y1="260" x2="230" y2="260" stroke="#39d353" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Right panel -->
  <g font-family="'Courier New', monospace" font-size="9" fill="#39d353" opacity="0.7" text-anchor="end">
    <text x="712" y="200">MODEL:</text>
    <text x="712" y="213" opacity="1" font-size="10">GEMINI</text>
    <line x1="645" y1="218" x2="712" y2="218" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="712" y="230">FRAME:</text>
    <text x="712" y="243">FASTAPI</text>
    <line x1="645" y1="248" x2="712" y2="248" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="712" y="260">STORE:</text>
    <text x="712" y="273">QDRANT</text>
    <line x1="645" y1="278" x2="712" y2="278" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="712" y="290">ENV:</text>
    <text x="712" y="303">DOCKER</text>
    <line x1="645" y1="308" x2="712" y2="308" stroke="#39d353" stroke-width="0.5" opacity="0.4"/>
    <text x="712" y="320">UI:</text>
    <text x="712" y="333">NEXT.JS</text>
  </g>

  <!-- Right connector line to ring -->
  <line x1="642" y1="260" x2="570" y2="260" stroke="#39d353" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- === CORNER FRAMES === -->
  <g stroke="#39d353" fill="none" stroke-width="1.5" opacity="0.6">
    <polyline points="10,30 10,10 30,10"/>
    <polyline points="770,10 790,10 790,30"/>
    <polyline points="10,490 10,510 30,510"/>
    <polyline points="770,510 790,510 790,490"/>
  </g>

  <!-- Bottom coordinates -->
  <text x="400" y="498" font-family="'Courier New', monospace" font-size="8" fill="#39d353" opacity="0.4" text-anchor="middle" letter-spacing="3">COORD: 34.0522°N  118.2437°W  ·  AUTH: PROMETHEUS  ·  MODE: VITRUVIAN</text>

  <!-- Top header -->
  <text x="30" y="28" font-family="'Courier New', monospace" font-size="9" fill="#39d353" opacity="0.6" letter-spacing="2">SYSTEM: NEURAL CORE  ·  STATUS: ONLINE  ·  SYNC: 99.9%</text>
</svg>
