<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes border-trace { 0% { stroke-dashoffset: 2200; } 100% { stroke-dashoffset: 0; } }
      @keyframes glow-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes shimmer { 0% { transform: translateX(-800px); } 100% { transform: translateX(800px); } }
      @keyframes tag-fade { 0%, 30% { opacity: 0; transform: translateY(6px); } 50%, 100% { opacity: 1; transform: translateY(0); } }
      .mono { font-family: 'Courier New', monospace; }
      .card-border { stroke-dasharray: 2200; animation: border-trace 2s ease-out 0.6s both; }
    </style>
    <filter id="glow-l">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm-l">
      <feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="card-bg-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/><stop offset="100%" style="stop-color:#0f0a0d"/>
    </linearGradient>
    <linearGradient id="accent-grad-l" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d2a8ff"/><stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="shimmer-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="card-clip-l"><rect x="0" y="0" width="800" height="180" rx="4"/></clipPath>
  </defs>

  <rect width="800" height="180" rx="4" fill="url(#card-bg-l)"/>

  <g opacity="0.04" stroke="#a855f7" stroke-width="0.5" clip-path="url(#card-clip-l)">
    <line x1="0" y1="45" x2="800" y2="45"/><line x1="0" y1="90" x2="800" y2="90"/>
    <line x1="0" y1="135" x2="800" y2="135"/>
    <line x1="200" y1="0" x2="200" y2="180"/><line x1="400" y1="0" x2="400" y2="180"/>
    <line x1="600" y1="0" x2="600" y2="180"/>
  </g>

  <rect x="-800" y="0" width="800" height="180" fill="url(#shimmer-l)" clip-path="url(#card-clip-l)" style="animation: shimmer 4s ease-in-out 2s infinite;"/>

  <rect x="0" y="0" width="4" height="180" rx="2" fill="url(#accent-grad-l)"/>
  <rect x="1" y="1" width="798" height="178" rx="4" fill="none" stroke="#a855f740" stroke-width="1.5" class="card-border"/>

  <g stroke="#a855f7" fill="none" stroke-width="1.5" opacity="0.7">
    <polyline points="750,10 790,10 790,30"/><polyline points="750,170 790,170 790,150"/>
  </g>

  <text x="28" y="38" class="mono" font-size="9" fill="#a855f760" letter-spacing="3">PROJECT_03  ·  LEGALTECH_AI</text>

  <text x="28" y="72" class="mono" font-size="32" font-weight="900" fill="#d2a8ff" letter-spacing="4" filter="url(#glow-l)">LEGALSPHERE</text>

  <rect x="310" y="48" width="82" height="22" rx="11" fill="#a855f715" stroke="#a855f760" stroke-width="1"/>
  <text x="351" y="63" class="mono" font-size="9" fill="#d2a8ff" text-anchor="middle" letter-spacing="1">NLP · LEGAL</text>

  <text x="28" y="102" class="mono" font-size="11" fill="#8b949e">AI-powered legal document analysis · Contract understanding · Risk detection</text>
  <text x="28" y="120" class="mono" font-size="11" fill="#8b949e">NLP entity extraction · Clause classification · Jurisdiction-aware reasoning</text>

  <g style="animation: tag-fade 2s ease-out 0.6s both;">
    <rect x="28" y="138" width="64" height="22" rx="2" fill="#a855f715" stroke="#a855f740" stroke-width="1"/>
    <text x="60" y="153" class="mono" font-size="9" fill="#d2a8ff" text-anchor="middle" letter-spacing="1">PYTORCH</text>

    <rect x="100" y="138" width="72" height="22" rx="2" fill="#a855f715" stroke="#a855f740" stroke-width="1"/>
    <text x="136" y="153" class="mono" font-size="9" fill="#d2a8ff" text-anchor="middle" letter-spacing="1">SPACY/NLP</text>

    <rect x="180" y="138" width="80" height="22" rx="2" fill="#a855f715" stroke="#a855f740" stroke-width="1"/>
    <text x="220" y="153" class="mono" font-size="9" fill="#d2a8ff" text-anchor="middle" letter-spacing="1">LANGCHAIN</text>

    <rect x="268" y="138" width="56" height="22" rx="2" fill="#a855f715" stroke="#a855f740" stroke-width="1"/>
    <text x="296" y="153" class="mono" font-size="9" fill="#d2a8ff" text-anchor="middle" letter-spacing="1">FASTAPI</text>

    <rect x="332" y="138" width="60" height="22" rx="2" fill="#a855f715" stroke="#a855f740" stroke-width="1"/>
    <text x="362" y="153" class="mono" font-size="9" fill="#d2a8ff" text-anchor="middle" letter-spacing="1">NEXT.JS</text>
  </g>

  <g filter="url(#glow-sm-l)" style="animation: glow-pulse 3s ease-in-out infinite;">
    <text x="755" y="96" class="mono" font-size="24" fill="#d2a8ff" text-anchor="middle">→</text>
    <text x="755" y="115" class="mono" font-size="8" fill="#d2a8ff99" text-anchor="middle" letter-spacing="2">VIEW</text>
  </g>
</svg>
