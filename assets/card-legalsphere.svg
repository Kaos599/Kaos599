<svg fill="none" viewBox="0 0 800 160" width="800" height="160" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes card-glow {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.12; }
    }
  </style>
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="160" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="160" rx="1.5" fill="#a855f7"/>
  <!-- Title -->
  <text x="24" y="32" font-size="18" font-weight="bold" font-family="'Courier New', monospace">
    <tspan fill="#58a6ff">LegalSphere </tspan><tspan fill="#ec4899">::</tspan><tspan fill="#58a6ff"> AI Legal Co-Pilot</tspan>
  </text>
  <!-- Badge -->
  <rect x="24" y="42" width="120" height="22" rx="4" fill="#1a1528" stroke="#d2a8ff" stroke-width="1"/>
  <text x="84" y="57" text-anchor="middle" font-size="11" fill="#d2a8ff" font-family="'Courier New', monospace">SIH FINALIST</text>
  <!-- Description -->
  <text x="24" y="82" font-size="11" fill="#8b949e" font-family="'Courier New', monospace">AI co-pilot for navigating legal research complexity,</text>
  <text x="24" y="98" font-size="11" fill="#8b949e" font-family="'Courier New', monospace">designed for commercial court proceedings.</text>
  <!-- Tags -->
  <rect x="24" y="112" width="36" height="22" rx="11" fill="none" stroke="#ec4899" stroke-opacity="0.4"/>
  <text x="42" y="127" text-anchor="middle" font-size="10" fill="#ec4899" font-family="'Courier New', monospace">RAG</text>
  <rect x="68" y="112" width="75" height="22" rx="11" fill="none" stroke="#ec4899" stroke-opacity="0.4"/>
  <text x="105" y="127" text-anchor="middle" font-size="10" fill="#ec4899" font-family="'Courier New', monospace">VectorDBs</text>
  <rect x="151" y="112" width="62" height="22" rx="11" fill="none" stroke="#ec4899" stroke-opacity="0.4"/>
  <text x="182" y="127" text-anchor="middle" font-size="10" fill="#ec4899" font-family="'Courier New', monospace">MongoDB</text>
  <rect x="221" y="112" width="62" height="22" rx="11" fill="none" stroke="#ec4899" stroke-opacity="0.4"/>
  <text x="252" y="127" text-anchor="middle" font-size="10" fill="#ec4899" font-family="'Courier New', monospace">FastAPI</text>
  <!-- Ambient glow -->
  <circle cx="750" cy="130" r="80" fill="url(#glow)" style="animation: card-glow 4s ease-in-out infinite"/>
</svg>
