<circle cx="760" cy="490" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 5.5s"/>
<circle cx="220" cy="22" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 6s"/>
<circle cx="580" cy="35" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 6.5s"/>
<circle cx="310" cy="498" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 7s"/>
