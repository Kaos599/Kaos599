<circle cx="160" cy="350" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 1.2s"/>
<circle cx="640" cy="370" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 2.7s"/>

<!-- 6 Spoke Rays (60 degree intervals, extending to r=240) -->
<g>
<line x1="400" y1="260" x2="640" y2="260" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" style="animation:spoke-pulse 5s ease-in-out infinite 0s"/>
<line x1="400" y1="260" x2="520" y2="52" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" style="animation:spoke-pulse 5s ease-in-out infinite 0.83s"/>
<line x1="400" y1="260" x2="280" y2="52" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" style="animation:spoke-pulse 5s ease-in-out infinite 1.66s"/>
<line x1="400" y1="260" x2="160" y2="260" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" style="animation:spoke-pulse 5s ease-in-out infinite 2.5s"/>
<line x1="400" y1="260" x2="280" y2="468" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" style="animation:spoke-pulse 5s ease-in-out infinite 3.33s"/>
<line x1="400" y1="260" x2="520" y2="468" stroke="#334155" stroke-width="0.5" stroke-dasharray="4 8" style="animation:spoke-pulse 5s ease-in-out infinite 4.16s"/>
</g>

<!-- Ring 4 (r=233) - TOOLS & FRONTIER - amber -->
<circle cx="400" cy="260" r="233" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="16 14" opacity="0.3" style="animation:ring-flow-ccw 26s linear infinite"/>

<!-- Ring 3 (r=144) - INFRASTRUCTURE & DATA - neutral ring -->
<circle cx="400" cy="260" r="144" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="12 10" opacity="0.5" style="animation:ring-flow-cw 20s linear infinite"/>

