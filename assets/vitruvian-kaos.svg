<circle cx="400" cy="260" r="25" fill="none" stroke="#f472b6" stroke-width="0.5" stroke-dasharray="4 6" class="center-ring" style="animation:spin-cw 8s linear infinite"/>
<text x="400" y="264" text-anchor="middle" fill="#ec4899" font-size="12" font-weight="bold" font-family="'Courier New', monospace" style="animation:phosphor-pulse 3s ease-in-out infinite">KAOS</text>

