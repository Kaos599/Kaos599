<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -10 800 540" width="800" height="540">
<defs>
<style>
.center-ring{transform-origin:400px 260px}
@keyframes ring-flow-cw{
  from{stroke-dashoffset:0}
  to{stroke-dashoffset:-346}
}
@keyframes ring-flow-ccw{
  from{stroke-dashoffset:0}
  to{stroke-dashoffset:346}
}
@keyframes node-breathe{
  0%,100%{opacity:0.7}
  50%{opacity:1}
}
@keyframes spin-cw{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
@keyframes spoke-pulse{
  0%,100%{stroke-dashoffset:0;opacity:0.3}
  50%{stroke-dashoffset:-24;opacity:0.6}
}
@keyframes phosphor-pulse{
  0%,100%{opacity:0.8}
  50%{opacity:1}
}
@keyframes data-panel-blink{
  0%,90%,100%{opacity:1}
  95%{opacity:0.3}
}
@keyframes dot-drift{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}
</style>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="2" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>
<filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
  <feGaussianBlur stdDeviation="6" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
  <circle cx="20" cy="20" r="0.8" fill="#94a3b8" opacity="0.08"/>
</pattern>
</defs>

<!-- Background -->
<rect width="800" height="520" fill="#0a0f1e"/>
<rect width="800" height="520" fill="url(#grid)" style="animation:phosphor-pulse 4.2s ease-in-out infinite"/>

<!-- Background scatter dots -->
<circle cx="52" cy="38" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 0s"/>
<circle cx="135" cy="95" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 0.5s"/>
<circle cx="78" cy="180" r="1" fill="#334155" opacity="0.3" style="animation:dot-drift 8s ease-in-out infinite 1s"/>
