<svg fill="none" viewBox="0 0 800 350" width="800" height="350" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes code-fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .code {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      fill: #94a3b8;
    }
    .title-text {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      fill: #8b949e;
      font-weight: bold;
    }
    .comment {
      font-style: italic;
    }
  </style>

  <defs>
    <!-- Subtle background grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#ec4899" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Outer container background -->
  <rect width="800" height="350" fill="#0d1117" rx="8"/>

  <!-- Background grid overlay -->
  <rect width="800" height="350" fill="url(#grid)" rx="8" opacity="0.3"/>

  <!-- Terminal header bar -->
  <rect y="0" width="800" height="28" fill="#161b22" rx="8"/>
  <!-- Square off bottom corners of header -->
  <rect y="20" width="800" height="8" fill="#161b22"/>

  <!-- Header bottom border -->
  <line x1="0" y1="28" x2="800" y2="28" stroke="#30363d" stroke-width="1"/>

  <!-- Traffic light dots -->
  <circle cx="20" cy="14" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="14" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="14" r="6" fill="#27c93f"/>

  <!-- Terminal title -->
  <text x="400" y="18" text-anchor="middle" class="title-text">kaos_agent_node.py &#x2014; 80&#xd7;24</text>

  <!-- Outer border -->
  <rect width="800" height="350" fill="none" stroke="#30363d" stroke-width="1" rx="8"/>

  <!-- Line 1: from langgraph import StateGraph -->
  <text x="30" y="60" class="code" style="animation: code-fade-in 0.8s ease-out 0.2s backwards; transform-origin: 30px 60px">
    <tspan fill="#ff7b72">from</tspan><tspan> langgraph </tspan><tspan fill="#ff7b72">import</tspan><tspan> StateGraph</tspan>
  </text>

  <!-- Line 2: from kaos_core import Brain, AgentLoop -->
  <text x="30" y="82" class="code" style="animation: code-fade-in 0.8s ease-out 0.4s backwards; transform-origin: 30px 82px">
    <tspan fill="#ff7b72">from</tspan><tspan> kaos_core </tspan><tspan fill="#ff7b72">import</tspan><tspan> </tspan><tspan fill="#d2a8ff">Brain</tspan><tspan>, </tspan><tspan fill="#d2a8ff">AgentLoop</tspan>
  </text>

  <!-- Line 3: (empty) -->

  <!-- Line 4: # Boot the Agent Architect -->
  <text x="30" y="126" class="code comment" style="animation: code-fade-in 0.8s ease-out 0.8s backwards; transform-origin: 30px 126px">
    <tspan fill="#8b949e"># Boot the Agent Architect</tspan>
  </text>

  <!-- Line 5: agent = Brain( -->
  <text x="30" y="148" class="code" style="animation: code-fade-in 0.8s ease-out 1.0s backwards; transform-origin: 30px 148px">
    <tspan>agent = </tspan><tspan fill="#d2a8ff">Brain</tspan><tspan>(</tspan>
  </text>

  <!-- Line 6: name="Harsh", -->
  <text x="60" y="170" class="code" style="animation: code-fade-in 0.8s ease-out 1.2s backwards; transform-origin: 60px 170px">
    <tspan>name=</tspan><tspan fill="#a5d6ff">"Harsh"</tspan><tspan>,</tspan>
  </text>

  <!-- Line 7: alias="Kaos599", -->
  <text x="60" y="192" class="code" style="animation: code-fade-in 0.8s ease-out 1.4s backwards; transform-origin: 60px 192px">
    <tspan>alias=</tspan><tspan fill="#a5d6ff">"Kaos599"</tspan><tspan>,</tspan>
  </text>

  <!-- Line 8: mode="Agentic", -->
  <text x="60" y="214" class="code" style="animation: code-fade-in 0.8s ease-out 1.6s backwards; transform-origin: 60px 214px">
    <tspan>mode=</tspan><tspan fill="#a5d6ff">"Agentic"</tspan><tspan>,</tspan>
  </text>

  <!-- Line 9: llm="Claude Opus 4.6", -->
  <text x="60" y="236" class="code" style="animation: code-fade-in 0.8s ease-out 1.8s backwards; transform-origin: 60px 236px">
    <tspan>llm=</tspan><tspan fill="#a5d6ff">"Claude Opus 4.6"</tspan><tspan>,</tspan>
  </text>

  <!-- Line 10: memory="Qdrant", -->
  <text x="60" y="258" class="code" style="animation: code-fade-in 0.8s ease-out 2.0s backwards; transform-origin: 60px 258px">
    <tspan>memory=</tspan><tspan fill="#a5d6ff">"Qdrant"</tspan><tspan>,</tspan>
  </text>

  <!-- Line 11: ) -->
  <text x="30" y="280" class="code" style="animation: code-fade-in 0.8s ease-out 2.2s backwards; transform-origin: 30px 280px">
    <tspan>)</tspan>
  </text>

  <!-- Line 12: (empty) -->

  <!-- Line 13: agent.run("Build the future. Break nothing. Ship fast.") -->
  <text x="30" y="302" class="code" style="animation: code-fade-in 0.8s ease-out 2.6s backwards; transform-origin: 30px 302px">
    <tspan>agent.</tspan><tspan fill="#d2a8ff">run</tspan><tspan>(</tspan><tspan fill="#a5d6ff">"Build the future. Break nothing. Ship fast."</tspan><tspan>)</tspan>
  </text>

  <!-- Blinking cursor after last line -->
  <rect x="467" y="290" width="8" height="14" fill="#ec4899" style="animation: cursor-blink 1s step-end infinite"/>

</svg>
