<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
<defs>
<style>
.mono{font-family:'Courier New',monospace}
.d{opacity:.7}.dp{fill:#ec4899}.dn{fill:#1e293b}.dc{fill:#06b6d4}.ds{fill:#334155}
.a1{animation:dot-pulse 3s ease-in-out infinite}
.a2{animation:dot-pulse 3s ease-in-out infinite .375s}
.a3{animation:dot-pulse 3s ease-in-out infinite .75s}
.a4{animation:dot-pulse 3s ease-in-out infinite 1.125s}
.a5{animation:dot-pulse 3s ease-in-out infinite 1.5s}
.a6{animation:dot-pulse 3s ease-in-out infinite 1.875s}
.a7{animation:dot-pulse 3s ease-in-out infinite 2.25s}
.a8{animation:dot-pulse 3s ease-in-out infinite 2.625s}
@keyframes dot-pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
@keyframes glitch1{0%,39%,41%,64%,66%,92%,94%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0);opacity:0}40%{clip-path:inset(15% 0 60% 0);transform:translate(-4px,0);opacity:.8}65%{clip-path:inset(40% 0 20% 0);transform:translate(3px,0);opacity:.7}93%{clip-path:inset(70% 0 5% 0);transform:translate(-2px,0);opacity:.9}}
@keyframes glitch2{0%,39%,41%,64%,66%,92%,94%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0);opacity:0}40%{clip-path:inset(50% 0 20% 0);transform:translate(3px,0);opacity:.6}65%{clip-path:inset(10% 0 70% 0);transform:translate(-3px,0);opacity:.5}93%{clip-path:inset(30% 0 40% 0);transform:translate(4px,0);opacity:.7}}
@keyframes glitch3{0%,39%,41%,64%,66%,92%,94%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0);opacity:0}40%{clip-path:inset(25% 0 50% 0);transform:translate(2px,1px);opacity:.5}65%{clip-path:inset(60% 0 10% 0);transform:translate(-4px,-1px);opacity:.6}93%{clip-path:inset(5% 0 80% 0);transform:translate(3px,1px);opacity:.5}}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.6}94%{opacity:1}96%{opacity:.8}97%{opacity:1}}
@keyframes cursor-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes slide-in-left{0%{transform:translateX(-60px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes slide-in-right{0%{transform:translateX(60px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes fade-up{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes border-flow{0%{stroke-dashoffset:1600}100%{stroke-dashoffset:0}}
@keyframes stat-blink{0%,94%,96%,98%,100%{opacity:1}95%,97%{opacity:.1}}
@keyframes progress-fill{0%{stroke-dashoffset:80}100%{stroke-dashoffset:0}}
@keyframes grid-pulse{0%,100%{opacity:.08}50%{opacity:.15}}
@keyframes corner-dot-travel{0%{stroke-dashoffset:120}100%{stroke-dashoffset:0}}
</style>
<filter id="ph" x="-15%" y="-40%" width="130%" height="180%">
<feGaussianBlur stdDeviation="8" result="bo"/><feFlood flood-color="#ec4899" flood-opacity=".25" result="co"/><feComposite in="co" in2="bo" operator="in" result="go"/>
<feGaussianBlur in="SourceGraphic" stdDeviation="3" result="bm"/><feFlood flood-color="#f472b6" flood-opacity=".5" result="cm"/><feComposite in="cm" in2="bm" operator="in" result="gm"/>
<feMerge><feMergeNode in="go"/><feMergeNode in="gm"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="bg" x1="0" y1="0" x2="800" y2="220" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#0a0f1e"/><stop offset="50%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0a0f1e"/>
</linearGradient>
<linearGradient id="pr" x1="400" y1="0" x2="400" y2="40" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#ec4899" stop-opacity=".06"/><stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
</linearGradient>
</defs>

<!-- BG -->
<rect width="800" height="220" fill="url(#bg)"/>
<rect width="800" height="40" fill="url(#pr)"/>

