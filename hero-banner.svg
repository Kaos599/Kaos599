<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(2200%); }
      }
      @keyframes glitch1 {
        0%, 92%, 100% { clip-path: inset(0 0 100% 0); transform: translate(0,0); opacity:0; }
        93% { clip-path: inset(10% 0 60% 0); transform: translate(-4px, 2px); opacity:1; }
        94% { clip-path: inset(50% 0 20% 0); transform: translate(4px, -2px); opacity:1; }
        95% { clip-path: inset(30% 0 40% 0); transform: translate(-2px, 1px); opacity:1; }
        96%, 99% { clip-path: inset(0 0 100% 0); opacity:0; }
        97% { clip-path: inset(70% 0 5% 0); transform: translate(3px, -1px); opacity:1; }
      }
      @keyframes glitch2 {
        0%, 94%, 100% { clip-path: inset(0 0 100% 0); transform: translate(0,0); opacity:0; }
        95% { clip-path: inset(20% 0 50% 0); transform: translate(5px, -2px); opacity:1; color:#39d353; }
        96% { clip-path: inset(60% 0 10% 0); transform: translate(-5px, 2px); opacity:1; }
        97%, 100% { clip-path: inset(0 0 100% 0); opacity:0; }
      }
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        92% { opacity: 1; }
        93% { opacity: 0.7; }
        94% { opacity: 1; }
        96% { opacity: 0.6; }
        97% { opacity: 1; }
      }
      @keyframes cursor-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes slide-in-left {
        0% { transform: translateX(-60px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes slide-in-right {
        0% { transform: translateX(60px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      @keyframes fade-up {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes border-flow {
        0% { stroke-dashoffset: 1600; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes corner-pulse {
        0%, 100% { opacity: 1; stroke-width: 2; }
        50% { opacity: 0.4; stroke-width: 1; }
      }
      .main-title {
        font-family: 'Courier New', monospace;
        font-size: 52px;
        font-weight: 900;
        letter-spacing: 8px;
        fill: #39d353;
        animation: flicker 8s infinite;
      }
      .glitch-layer-1 {
        font-family: 'Courier New', monospace;
        font-size: 52px;
        font-weight: 900;
        letter-spacing: 8px;
        fill: #ff6b6b;
        animation: glitch1 8s infinite;
      }
      .glitch-layer-2 {
        font-family: 'Courier New', monospace;
        font-size: 52px;
        font-weight: 900;
        letter-spacing: 8px;
        fill: #39d353;
        animation: glitch2 8s infinite;
      }
      .subtitle {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #39d35399;
        letter-spacing: 4px;
        animation: fade-up 1.2s ease-out 0.8s both;
      }
      .corner-line { animation: corner-pulse 3s ease-in-out infinite; }
      .border-rect {
        fill: none;
        stroke: #39d35340;
        stroke-width: 1;
        stroke-dasharray: 1600;
        animation: border-flow 3s ease-out 0.2s both;
      }
      .prompt { fill: #39d353; font-family: 'Courier New', monospace; font-size: 11px; }
      .cursor { fill: #39d353; animation: cursor-blink 1s step-end infinite; }
      .stat-label { font-family: 'Courier New', monospace; font-size: 9px; fill: #39d35366; letter-spacing: 2px; }
      .stat-val { font-family: 'Courier New', monospace; font-size: 11px; fill: #39d353; letter-spacing: 1px; }
      .left-panel { animation: slide-in-left 0.8s ease-out 0.3s both; }
      .right-panel { animation: slide-in-right 0.8s ease-out 0.3s both; }
      .center-panel { animation: fade-up 0.8s ease-out 0.1s both; }
    </style>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050708"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#050805"/>
    </linearGradient>
    <linearGradient id="green-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39d353;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#39d353;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#39d353;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="side-fade-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="side-fade-r" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#bg-grad)"/>

  <!-- Subtle Cyber Grid -->
  <g opacity="0.04">
    <path d="M0,55 L800,55 M0,110 L800,110 M0,165 L800,165 M200,0 L200,220 M400,0 L400,220 M600,0 L600,220" stroke="#39d353" stroke-width="1"/>
  </g>

  <!-- Scanline overlay -->
  <rect x="0" y="0" width="800" height="4" fill="url(#green-fade)" opacity="0.1" style="animation: scanline 4s linear infinite;"/>
  <rect x="0" y="0" width="800" height="12" fill="url(#green-fade)" opacity="0.03" style="animation: scanline 6s linear infinite reverse;"/>

  <!-- Main border -->
  <rect x="10" y="10" width="780" height="200" rx="4" class="border-rect"/>

  <!-- Corner decorations TL -->
  <g class="corner-line" stroke="#39d353" stroke-width="2" fill="none">
    <path d="M 10,30 L 10,10 L 30,10" />
    <path d="M 770,10 L 790,10 L 790,30" />
    <path d="M 10,190 L 10,210 L 30,210" />
    <path d="M 770,210 L 790,210 L 790,190" />
  </g>

  <!-- Left panel: system info -->
  <g class="left-panel" transform="translate(0, -6)">
    <text x="32" y="46" class="stat-label">SYSTEM</text>
    <text x="32" y="61" class="stat-val">KAOS_599</text>
    <line x1="32" y1="68" x2="120" y2="68" stroke="#39d35340" stroke-width="1"/>
    
    <text x="32" y="84" class="stat-label">CORE_LOOP</text>
    <text x="32" y="99" class="stat-val" fill="#39d353">● ACTIVE</text>
    <line x1="32" y1="106" x2="120" y2="106" stroke="#39d35340" stroke-width="1"/>
    
    <text x="32" y="122" class="stat-label">PROTOCOL</text>
    <text x="32" y="137" class="stat-val">AGENTIC</text>
    <line x1="32" y1="144" x2="120" y2="144" stroke="#39d35340" stroke-width="1"/>
    
    <text x="32" y="160" class="stat-label">RUNTIME</text>
    <text x="32" y="175" class="stat-val">v4.2.1</text>
  </g>

  <!-- Center: Main Title -->
  <g class="center-panel">
    <g transform="translate(400, 105)">
      <text class="glitch-layer-1" text-anchor="middle" y="0">HARSH DAYAL</text>
      <text class="glitch-layer-2" text-anchor="middle" y="0">HARSH DAYAL</text>
      <text class="main-title" text-anchor="middle" y="0" filter="url(#glow)">HARSH DAYAL</text>
    </g>
    <!-- Subtitle line -->
    <line x1="180" y1="130" x2="330" y2="130" stroke="url(#green-fade)" stroke-width="1"/>
    <text x="400" y="133" class="subtitle" text-anchor="middle">AI SWE  ·  AGENT ARCHITECT  ·  KAOS599</text>
    <line x1="470" y1="130" x2="620" y2="130" stroke="url(#green-fade)" stroke-width="1"/>

    <!-- Bottom terminal line -->
    <text x="400" y="196" class="prompt" text-anchor="middle" opacity="0.7">
      &gt; root@kaos_system:~$ ./initialize_workflow.sh
    </text>
    <rect x="582" y="187" width="7" height="11" class="cursor"/>
  </g>

  <!-- Right panel: metrics -->
  <g class="right-panel" transform="translate(0, -6)">
    <text x="768" y="46" class="stat-label" text-anchor="end">SWARM_SYNC</text>
    <text x="768" y="61" class="stat-val" text-anchor="end">99.9%</text>
    <line x1="680" y1="68" x2="768" y2="68" stroke="#39d35340" stroke-width="1"/>
    
    <text x="768" y="84" class="stat-label" text-anchor="end">ARCH</text>
    <text x="768" y="99" class="stat-val" text-anchor="end">LANGGRAPH</text>
    <line x1="680" y1="106" x2="768" y2="106" stroke="#39d35340" stroke-width="1"/>
    
    <text x="768" y="122" class="stat-label" text-anchor="end">COGNITION</text>
    <text x="768" y="137" class="stat-val" text-anchor="end">GEMINI_1.5</text>
    <line x1="680" y1="144" x2="768" y2="144" stroke="#39d35340" stroke-width="1"/>
    
    <text x="768" y="160" class="stat-label" text-anchor="end">MEMORY</text>
    <text x="768" y="175" class="stat-val" text-anchor="end">CHROMADB</text>
  </g>

  <!-- Side vignettes -->
  <rect x="0" y="0" width="90" height="220" fill="url(#side-fade-l)" style="pointer-events:none;"/>
  <rect x="710" y="0" width="90" height="220" fill="url(#side-fade-r)" style="pointer-events:none;"/>
</svg>
