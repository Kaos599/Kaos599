<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes hub-pulse {
        0%, 100% { r: 30px; fill: #101512; stroke: #39d35340; stroke-width: 2; }
        50% { r: 33px; fill: #161c1a; stroke: #39d353; stroke-width: 3; filter: url(#glow); }
      }
      @keyframes node-activate {
        0%, 80% { r: 12px; fill: #0b110b; stroke: #39d35360; stroke-width: 1.5; filter: none; }
        85% { r: 14px; fill: #161c1a; stroke: #58a6ff; stroke-width: 2.5; filter: url(#glow-blue); }
        90%, 100% { r: 12px; fill: #0b110b; stroke: #39d35360; stroke-width: 1.5; filter: none; }
      }
      @keyframes packet-out {
        0% { stroke-dashoffset: 200; opacity: 0; }
        10% { opacity: 1; }
        30% { stroke-dashoffset: 0; opacity: 1; }
        40%, 100% { stroke-dashoffset: 0; opacity: 0; }
      }
      @keyframes packet-in {
        0%, 50% { stroke-dashoffset: 200; opacity: 0; }
        60% { opacity: 1; }
        80% { stroke-dashoffset: 0; opacity: 1; }
        90%, 100% { stroke-dashoffset: 0; opacity: 0; }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
      .mono { font-family: 'Courier New', monospace; }
    </style>

    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-sm"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-blue"><feGaussianBlur stdDeviation="3" result="b"/><feColorMatrix type="matrix" values="0 0 0 0 0.345  0 0 0 0 0.651  0 0 0 0 1  0 0 0 1 0"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050708"/>
      <stop offset="100%" style="stop-color:#070a07"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Static ambient background rings -->
  <g transform="translate(400, 200)">
    <circle r="160" fill="none" stroke="#39d353" stroke-width="0.5" stroke-dasharray="2 12" opacity="0.3" style="animation: spin-slow 30s linear infinite;"/>
    <circle r="120" fill="none" stroke="#39d353" stroke-width="0.5" stroke-dasharray="8 8" opacity="0.1" style="animation: spin-slow 20s linear infinite reverse;"/>
    <circle r="80" fill="none" stroke="#39d353" stroke-width="1" stroke-dasharray="30 10" opacity="0.2" style="animation: spin-slow 15s linear infinite;"/>
  </g>

  <!-- Title / Label -->
  <text x="30" y="30" class="mono" font-size="12" fill="#39d353" opacity="0.8" filter="url(#glow-sm)">[ DISTRIBUTED AGENT SWARM ]</text>
  <line x1="30" y1="40" x2="250" y2="40" stroke="#39d35340"/>
  <text x="30" y="55" class="mono" font-size="9" fill="#39d353" opacity="0.5">ARCHITECTURE: HUB &amp; SPOKE  |  PROTOCOL: LANGGRAPH SECURE</text>

  <!-- Edges -->
  <g transform="translate(400, 200)" fill="none" stroke-width="1.5">
    <!-- Static Spoke Paths -->
    <g stroke="#39d35320">
      <line x1="0" y1="0" x2="0" y2="-160"/>        <!-- Top -->
      <line x1="0" y1="0" x2="151.4" y2="-52.6"/>   <!-- Top Right -->
      <line x1="0" y1="0" x2="93.8" y2="129.4"/>    <!-- Bottom Right -->
      <line x1="0" y1="0" x2="-93.8" y2="129.4"/>   <!-- Bottom Left -->
      <line x1="0" y1="0" x2="-151.4" y2="-52.6"/>  <!-- Top Left -->
    </g>

    <!-- Animated Packets Outwards -->
    <g stroke="#39d353" stroke-dasharray="20 200" filter="url(#glow-sm)">
      <line x1="0" y1="-30" x2="0" y2="-160" style="animation: packet-out 6s infinite 0s;"/>
      <line x1="28.4" y1="-9.8" x2="151.4" y2="-52.6" style="animation: packet-out 6s infinite 0.5s;"/>
      <line x1="17.6" y1="24.2" x2="93.8" y2="129.4" style="animation: packet-out 6s infinite 1.0s;"/>
      <line x1="-17.6" y1="24.2" x2="-93.8" y2="129.4" style="animation: packet-out 6s infinite 1.5s;"/>
      <line x1="-28.4" y1="-9.8" x2="-151.4" y2="-52.6" style="animation: packet-out 6s infinite 2.0s;"/>
    </g>

    <!-- Animated Packets Inwards (blue) -->
    <g stroke="#58a6ff" stroke-dasharray="20 200" filter="url(#glow-sm)">
      <line x1="0" y1="-160" x2="0" y2="-30" style="animation: packet-in 6s infinite 0s;"/>
      <line x1="151.4" y1="-52.6" x2="28.4" y2="-9.8" style="animation: packet-in 6s infinite 0.5s;"/>
      <line x1="93.8" y1="129.4" x2="17.6" y2="24.2" style="animation: packet-in 6s infinite 1.0s;"/>
      <line x1="-93.8" y1="129.4" x2="-17.6" y2="24.2" style="animation: packet-in 6s infinite 1.5s;"/>
      <line x1="-151.4" y1="-52.6" x2="-28.4" y2="-9.8" style="animation: packet-in 6s infinite 2.0s;"/>
    </g>
  </g>

  <!-- Nodes -->
  <g transform="translate(400, 200)">
    <!-- Central Orchestrator -->
    <circle cx="0" cy="0" class="hub" style="animation: hub-pulse 4s infinite;"/>
    <text x="0" y="4" class="mono" font-size="10" font-weight="bold" fill="#39d353" text-anchor="middle">ORCH</text>
    <text x="0" y="55" class="mono" font-size="10" fill="#39d353" text-anchor="middle" filter="url(#glow-sm)" style="animation: blink 2s infinite;">ROUTER_ACTIVE</text>

    <!-- Peripheral Agents -->
    <!-- Top (0 deg) -->
    <circle cx="0" cy="-160" class="agent" style="animation: node-activate 6s infinite 0s;"/>
    <text x="0" y="-180" class="mono" font-size="10" fill="#8b949e" text-anchor="middle">RESEARCHER</text>
    
    <!-- Top Right (72 deg) -->
    <circle cx="151.4" cy="-52.6" class="agent" style="animation: node-activate 6s infinite 0.5s;"/>
    <text x="171.4" y="-52.6" class="mono" font-size="10" fill="#8b949e" alignment-baseline="middle">WRITER</text>
    
    <!-- Bottom Right (144 deg) -->
    <circle cx="93.8" cy="129.4" class="agent" style="animation: node-activate 6s infinite 1.0s;"/>
    <text x="113.8" y="129.4" class="mono" font-size="10" fill="#8b949e" alignment-baseline="middle">CRITIC</text>

    <!-- Bottom Left (216 deg) -->
    <circle cx="-93.8" cy="129.4" class="agent" style="animation: node-activate 6s infinite 1.5s;"/>
    <text x="-113.8" y="129.4" class="mono" font-size="10" fill="#8b949e" text-anchor="end" alignment-baseline="middle">VALIDATOR</text>

    <!-- Top Left (288 deg) -->
    <circle cx="-151.4" cy="-52.6" class="agent" style="animation: node-activate 6s infinite 2.0s;"/>
    <text x="-171.4" y="-52.6" class="mono" font-size="10" fill="#8b949e" text-anchor="end" alignment-baseline="middle">SUMMARIZER</text>
  </g>

  <!-- Left Side Telemetry Blocks -->
  <g class="mono" font-size="9" fill="#39d353" opacity="0.8">
    <text x="30" y="320">NODES_ONLINE:</text>
    <text x="110" y="320" fill="#fff" filter="url(#glow-sm)">5/5</text>
    
    <text x="30" y="340">THROUGHPUT:</text>
    <text x="110" y="340">24.1 req/s</text>
    
    <text x="30" y="360">FAULT_TOL:</text>
    <text x="110" y="360" fill="#58a6ff">ENABLED</text>
  </g>
  
  <rect x="30" y="375" width="20" height="2" fill="#39d353" opacity="0.5"/>
  <rect x="55" y="375" width="40" height="2" fill="#39d353" opacity="0.7"/>
  <rect x="100" y="375" width="10" height="2" fill="#58a6ff" opacity="0.9" filter="url(#glow-blue)"/>

</svg>
